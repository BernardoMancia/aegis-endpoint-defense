services:
  aegis-c2:
    build:
      context: ./server_vps
      dockerfile: Dockerfile
    container_name: aegis-c2-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_PATH=/app/data/aegis.db
      - AEGIS_PORT=5000
      - AEGIS_API_TOKEN=mude-este-token-secreto-agora
      - AEGIS_SECRET_KEY=chave-secreta-flask-muito-longa-e-aleatoria
    volumes:
      - aegis-data:/app/data

volumes:
  aegis-data:
    driver: local
