<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis SOC — Setup MFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
/* Aegis Hyper-Glass Design System */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --deep-bg: #030712;
    --glass-bg: rgba(17, 24, 39, 0.45);
    --glass-border: rgba(255, 255, 255, 0.08);
    --neon-blue: #0ea5e9;
    --neon-blue-glow: rgba(14, 165, 233, 0.4);
    --neon-purple: #8b5cf6;
    --neon-purple-glow: rgba(139, 92, 246, 0.4);
    --neon-emerald: #10b981;
    --neon-rose: #f43f5e;
    --text-primary: #f8fafc;
    --text-muted: #94a3b8;
}

* { box-sizing: border-box; font-family: 'Outfit', sans-serif; }

body {
    background-color: var(--deep-bg);
    color: var(--text-primary);
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Background AnimatedMesh */
.bg-mesh {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
    filter: blur(80px);
    animation: meshFlow 20s ease-in-out infinite alternate;
}
@keyframes meshFlow {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.1) translate(20px, 10px); }
}

/* Glassmorphism Generic Card */
.hyper-glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

/* Modern Scrollbars */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }

/* Inputs Fix */
.aegis-input {
    background: rgba(0, 0, 0, 0.3) !important;
    border: 1px solid var(--glass-border) !important;
    color: var(--text-primary) !important;
    border-radius: 10px;
    padding: 12px 16px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    width: 100%;
    color-scheme: dark;
}
.aegis-input:focus {
    border-color: var(--neon-blue) !important;
    box-shadow: 0 0 15px var(--neon-blue-glow) !important;
    transform: translateY(-1px);
}

/* Premium Buttons */
.aegis-btn-primary {
    background: linear-gradient(135deg, var(--neon-blue), #0284c7);
    color: white;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px var(--neon-blue-glow);
    display: inline-flex; align-items: center; gap: 8px;
}
.aegis-btn-primary:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 25px var(--neon-blue-glow);
}
.aegis-btn-primary:active { transform: translateY(1px); }

.aegis-btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    padding: 10px 20px;
    border-radius: 12px;
    transition: all 0.3s ease;
}
.aegis-btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--neon-blue); }

/* Toasts */
#toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast {
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 14px 20px;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    display: flex; align-items: center; gap: 12px;
    transform: translateX(120%);
    transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.toast.show { transform: translateX(0); }
</style>
    </head><body>
    <div class="bg-mesh"></div>
    <div class="max-w-2xl mx-auto py-20 px-6">
        <div class="hyper-glass p-10 text-center space-y-8">
            <div class="mx-auto w-16 h-16 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-500 mb-4">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            
            <h1 class="text-3xl font-bold">Configurar MFA</h1>
            <p class="text-slate-400">Escaneie o QR Code abaixo com seu aplicativo autenticador favorito (Google Authenticator, Authy, etc).</p>
            
            <div class="bg-white p-6 rounded-2xl inline-block shadow-[0_0_50px_rgba(255,255,255,0.1)]">
                <img src="{{ qrcode_url }}" alt="MFA QR Code" class="w-48 h-48">
            </div>

            <div class="space-y-4 max-w-sm mx-auto">
                <p class="text-xs text-slate-500 font-mono">Secret Key: <span class="bg-black/40 px-2 py-1 rounded text-white">{{ secret }}</span></p>
                
                <form action="/mfa/setup" method="POST" class="space-y-4">
                    <input type="text" name="token" class="aegis-input text-center text-2xl tracking-[0.5em] font-bold" placeholder="000000" maxlength="6" required>
                    <button type="submit" class="w-full aegis-btn-primary justify-center">Verificar e Ativar</button>
                    <a href="/profile" class="block text-xs text-slate-500 hover:text-white transition-colors">Cancelar e Voltar</a>
                </form>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
    
    <div id="toast-container"></div>
</body></html>
