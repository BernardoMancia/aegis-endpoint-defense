<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis SOC — Verificação MFA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #080c14; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(14,165,233,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(14,165,233,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .card { background: rgba(13,17,23,0.9); backdrop-filter: blur(24px); border: 1px solid rgba(14,165,233,0.15); border-radius: 20px; box-shadow: 0 0 80px rgba(14,165,233,0.06), 0 32px 64px rgba(0,0,0,0.4); }
    .digit-input { background: rgba(22,27,36,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #e2e8f0; padding: 16px; font-size: 28px; font-family: 'JetBrains Mono', monospace; text-align: center; letter-spacing: 8px; width: 100%; outline: none; transition: all 0.2s; }
    .digit-input:focus { border-color: rgba(14,165,233,0.5); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
    .btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; font-weight: 600; padding: 13px 24px; border-radius: 10px; width: 100%; border: none; cursor: pointer; font-size: 15px; transition: all 0.2s; }
    .btn-primary:hover { background: linear-gradient(135deg, #38bdf8, #0ea5e9); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(14,165,233,0.35); }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; padding: 12px 16px; font-size: 13px; }
    .pulse-shield { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  
    /* Premium Glassmorphism & Animations */
    .glass {
      background: rgba(13, 17, 23, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(14, 165, 233, 0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .glass-hover {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .glass-hover:hover {
      border-color: rgba(14, 165, 233, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    
    /* Toast System */
    #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast { background: rgba(20, 25, 35, 0.95); backdrop-filter: blur(16px); border-radius: 12px; padding: 14px 24px; color: #fff; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); transform: translateX(120%) scale(0.9); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: auto; }
    .toast.show { transform: translateX(0) scale(1); opacity: 1; }
    .toast-error { border-left: 4px solid #f87171; background: linear-gradient(90deg, rgba(248,113,113,0.15), rgba(20,25,35,0.95) 30%); }
    .toast-success { border-left: 4px solid #4ade80; background: linear-gradient(90deg, rgba(74,222,128,0.15), rgba(20,25,35,0.95) 30%); }
    .toast-warning { border-left: 4px solid #fbbf24; background: linear-gradient(90deg, rgba(251,191,36,0.15), rgba(20,25,35,0.95) 30%); }
    
    /* Base Input fixes */
    input, select { color-scheme: dark; }

    /* Button Animations */
    button { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
    button:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); filter: brightness(1.1); }
    button:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
    .tab-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
    .tab-btn:hover { transform: translateY(-2px); }

</style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="bg-grid"></div>
  <div class="card w-full max-w-sm mx-4 p-8">

    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-700 flex items-center justify-center pulse-shield">
        <svg style="width:32px;height:32px;" fill="none" stroke="white" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
    </div>

    <h1 class="text-xl font-bold text-white text-center mb-1">Verificação em Duas Etapas</h1>
    <p class="text-sm text-slate-400 text-center mb-6">Abra o <span class="text-sky-400 font-medium">Google Authenticator</span> e insira o código de 6 dígitos.</p>

    {% if error %}
    <div class="alert-error mb-5">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/mfa/verify" class="space-y-4" id="mfa-form">
      <div>
        <label for="mfa-code" class="text-xs font-medium text-slate-500 uppercase tracking-wider block mb-2">Código TOTP</label>
        <input id="mfa-code" name="code" type="text" class="digit-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" autofocus />
      </div>
      <button type="submit" class="btn-primary">🔐 Verificar e Entrar</button>
    </form>

    <div class="mt-6 pt-5 border-t border-white/5">
      <details class="group">
        <summary class="text-xs text-slate-600 cursor-pointer hover:text-slate-400 transition-colors text-center select-none">
          Não consegue acessar o autenticador?
        </summary>
        <form method="POST" action="/mfa/verify" class="mt-4 space-y-3">
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wider block">Código de Recuperação</label>
          <input name="recovery_code" type="text" class="digit-input" style="font-size:16px; letter-spacing:3px;" placeholder="XXXXX" maxlength="10" />
          <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">🔑 Usar Código de Recuperação</button>
          <p class="text-xs text-slate-700 text-center">Cada código só pode ser usado uma vez.</p>
        </form>
      </details>
    </div>

    <div class="mt-4 text-center">
      <a href="/login" class="text-xs text-slate-700 hover:text-slate-400 transition-colors">← Voltar ao login</a>
    </div>
  </div>

  <script>
    const input = document.getElementById('mfa-code');
    input.addEventListener('input', () => {
      if (input.value.replace(/\D/g,'').length === 6) {
        setTimeout(() => document.getElementById('mfa-form').submit(), 200);
      }
    });
    input.addEventListener('keypress', e => { if (!/\d/.test(e.key)) e.preventDefault(); });
  </script>
</body>
</html>
