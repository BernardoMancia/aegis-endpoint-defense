<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis SOC — MFA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
        tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            fluent: { 
              bg: '#141414', 
              surface: 'rgba(30, 30, 30, 0.45)', 
              surfaceHover: 'rgba(45, 45, 45, 0.6)',
              border: 'rgba(255, 255, 255, 0.08)', 
              primary: '#0ea5e9', 
              primaryHover: '#0284c7', 
              text: '#e2e8f0', 
              textMuted: '#94a3b8' 
            },
            dark: { 900: '#0a0a0a', 850: '#181818', 800: '#1a1a1a', 750: '#222222', 700: '#2a2a2a', 600: '#333333' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { 
      color-scheme: dark; 
      font-family: 'Inter', sans-serif; 
      background: #141414; 
      color: #e2e8f0; 
      margin: 0; 
      min-height: 100vh; 
      overflow: hidden; 
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    /* Background Orbs & Mesh */
    .bg-mesh { position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; z-index: 0; }
    .glow-orb-1 { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(14,165,233,0.02) 0%, transparent 60%); top: -200px; left: -200px; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(40px); }
    .glow-orb-2 { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.015) 0%, transparent 60%); bottom: -100px; right: -100px; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(40px); }

    /* Fluent Glass Modifiers */
    .bg-fluent-surface { background: rgba(35, 35, 35, 0.6) !important; backdrop-filter: blur(16px) !important; -webkit-backdrop-filter: blur(16px) !important; }
    .fluent-card { background: rgba(40, 40, 40, 0.5) !important; backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform 0.2s, box-shadow 0.2s; }
    .fluent-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1) !important; }
    
    .fluent-input { background: #1e1e1e !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #e2e8f0 !important; outline: none; transition: all 0.2s !important; border-radius: 8px !important; padding: 10px 14px !important; width: 100%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2) !important; }
    .fluent-input:focus { border-color: #0ea5e9 !important; box-shadow: 0 0 0 3px rgba(14,165,233,0.15), inset 0 2px 4px rgba(0,0,0,0.2) !important; }
    
    .fluent-btn { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary, .fluent-btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7) !important; color: white !important; border: none !important; box-shadow: 0 4px 14px rgba(14, 165, 233, 0.3) !important; font-weight: 600 !important; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .btn-primary:hover, .fluent-btn-primary:hover { box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5) !important; transform: translateY(-2px) scale(1.02) !important; filter: brightness(1.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .btn-primary:active, .fluent-btn-primary:active { transform: translateY(1px) !important; }
    
    .btn-action { background: rgba(255,255,255,0.05) !important; color: #e2e8f0 !important; border-color: rgba(255,255,255,0.1) !important; backdrop-filter: blur(8px); }
    .btn-action:hover { background: rgba(255,255,255,0.1) !important; border-color: rgba(255,255,255,0.15) !important; }

    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-pending { background: rgba(251, 191, 36, 0.1) !important; color: #fbbf24 !important; border: 1px solid rgba(251, 191, 36, 0.2) !important; }
    .badge-active { background: rgba(74, 222, 128, 0.1) !important; color: #4ade80 !important; border: 1px solid rgba(74, 222, 128, 0.2) !important; }
    .badge-rejected { background: rgba(248, 113, 113, 0.1) !important; color: #f87171 !important; border: 1px solid rgba(248, 113, 113, 0.2) !important; }

    /* Login / Single Cards specific (Auth pages) */
    .auth-card { background: rgba(30, 30, 30, 0.7) !important; backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 16px !important; box-shadow: 0 24px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1) !important; }

    /* Navigation Sidebar styling overrides */
    aside nav button, aside nav a { border-radius: 8px !important; border: 1px solid transparent; transition: all 0.2s; }
    aside nav button:hover:not(.bg-white\/10), aside nav a:hover:not(.bg-white\/10) { background: rgba(255,255,255,0.04) !important; border-color: rgba(255,255,255,0.02); }
    aside nav .bg-white\/10 { background: linear-gradient(90deg, rgba(14,165,233,0.15) 0%, transparent 100%) !important; border-left: 3px solid #0ea5e9 !important; border-radius: 4px !important; color: white !important; }
    aside nav .text-fluent-textMuted { color: #94a3b8 !important; }

    label { font-size: 12px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; display: block; letter-spacing: 0.2px; }

    /* Tables */
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    th { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; color: #e2e8f0; transition: background 0.2s; }
    tr { transition: transform 0.2s; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }
    tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  
  <div class="auth-card w-full max-w-sm mx-4 p-8">

    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-700 flex items-center justify-center pulse-shield">
        <svg style="width:32px;height:32px;" fill="none" stroke="black" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
    </div>

    <h1 class="text-xl font-bold text-white text-center mb-1">Verificação em Duas Etapas</h1>
    <p class="text-sm text-slate-400 text-center mb-6">Abra o <span class="text-sky-400 drop-shadow-[0_0_4px_rgba(56,189,248,0.2)] font-medium">Google Authenticator</span> e insira o código de 6 dígitos.</p>

    {% if error %}
    <div class="alert-error mb-5">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/mfa/verify" class="space-y-4" id="mfa-form">
      <div>
        <label for="mfa-code" class="text-xs font-medium text-slate-500 uppercase tracking-wider block mb-2">Código TOTP</label>
        <input id="mfa-code" name="code" type="text" class="digit-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" autofocus />
      </div>
      <button type="submit" class="btn-primary">🔐 Verificar e Entrar</button>
    </form>

    <div class="mt-6 pt-5 border-t border-white/5">
      <details class="group">
        <summary class="text-xs text-slate-600 cursor-pointer hover:text-slate-400 transition-colors text-center select-none">
          Não consegue acessar o autenticador?
        </summary>
        <form method="POST" action="/mfa/verify" class="mt-4 space-y-3">
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wider block">Código de Recuperação</label>
          <input name="recovery_code" type="text" class="digit-input" style="font-size:16px; letter-spacing:3px;" placeholder="XXXXX" maxlength="10" />
          <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">🔑 Usar Código de Recuperação</button>
          <p class="text-xs text-slate-700 text-center">Cada código só pode ser usado uma vez.</p>
        </form>
      </details>
    </div>

    <div class="mt-4 text-center">
      <a href="/login" class="text-xs text-slate-700 hover:text-slate-400 transition-colors">← Voltar ao login</a>
    </div>
  </div>

  <script>
    const input = document.getElementById('mfa-code');
    input.addEventListener('input', () => {
      if (input.value.replace(/\D/g,'').length === 6) {
        setTimeout(() => document.getElementById('mfa-form').submit(), 200);
      }
    });
    input.addEventListener('keypress', e => { if (!/\d/.test(e.key)) e.preventDefault(); });
  </script>
</body>
</html>
