<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis SOC — Autenticação</title>
  <meta name="description" content="Portal de acesso ao painel SOC da plataforma Aegis SIEM & EDR" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Aegis Next-Gen Deep Space & Neon Theme */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    :root {
        --deep-space: #0B0F19;
        --card-bg: rgba(17, 24, 39, 0.6);
        --neon-sky: #0EA5E9;
        --neon-emerald: #10B981;
        --neon-rose: #F43F5E;
        --border-subtle: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
        background-color: var(--deep-space);
        background-image: radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.06), transparent 25%), 
                          radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.04), transparent 25%);
        color: #E2E8F0;
        min-height: 100vh;
        overflow-x: hidden;
        margin: 0;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-sky); }

    /* Bento Cards & Glassmorphism */
    .bento-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .bento-card:hover { 
        transform: translateY(-4px); 
        border-color: rgba(14, 165, 233, 0.3);
        box-shadow: 0 12px 30px rgba(14, 165, 233, 0.15);
    }

    /* Base Input fixes (To prevent white background/text bugs) */
    .aegis-input {
        background: rgba(15, 23, 42, 0.8) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: #F8FAFC !important;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        width: 100%;
        outline: none;
        transition: all 0.3s ease;
        color-scheme: dark; /* AutoFill Support */
    }
    .aegis-input:focus {
        border-color: var(--neon-sky) !important;
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15) !important;
    }

    /* Buttons */
    .btn-neon {
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(14,165,233,0.3);
    }
    .btn-neon:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 8px 25px rgba(14,165,233,0.5);
    }
    .btn-danger-neon {
        background: rgba(244, 63, 94, 0.1);
        border: 1px solid rgba(244, 63, 94, 0.3);
        color: #FDA4AF;
        font-weight: 600;
        padding: 10px 20px;
        border-radius: 10px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-danger-neon:hover {
        background: rgba(244, 63, 94, 0.2);
        border-color: var(--neon-rose);
        box-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        transform: translateY(-2px);
    }

    /* Toasts */
    #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); border-radius: 12px; padding: 14px 24px; color: #fff; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); transform: translateX(120%) scale(0.9); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: auto; }
    .toast.show { transform: translateX(0) scale(1); opacity: 1; }
    .toast-error { border-left: 4px solid var(--neon-rose); }
    .toast-success { border-left: 4px solid var(--neon-emerald); }
    .toast-warning { border-left: 4px solid #F59E0B; }
</style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="bg-grid"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb-2"></div>
  <div class="scan-line"></div>

  <div class="card w-full max-w-md mx-4 p-8 fade-up">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-500 to-blue-700 flex items-center justify-center flex-shrink-0">
        <svg style="width:20px;height:20px;" fill="none" stroke="white" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-bold text-white text-lg leading-none">AEGIS <span class="text-sky-400">SOC</span></h1>
        <p class="text-xs text-slate-500 mt-0.5">Security Operations Center</p>
      </div>
    </div>

    <div class="flex gap-2 mb-6 p-1 bg-slate-900/50 rounded-xl">
      <button id="tab-login-btn" class="tab-btn active flex-1" onclick="showTab('login')">Entrar</button>
      <button id="tab-register-btn" class="tab-btn flex-1" onclick="showTab('register')">Solicitar Acesso</button>
    </div>

    {% if error %}
    <div class="alert-error mb-5">⚠️ {{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert-success mb-5">✅ {{ success }}</div>
    {% endif %}

    <div id="tab-login">
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="login-user">Usuário</label>
          <input id="login-user" name="username" type="text" class="input-field" placeholder="seu.usuario" autocomplete="username" required />
        </div>
        <div>
          <label for="login-pass">Senha</label>
          <input id="login-pass" name="password" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary mt-2">🔐 Entrar no SOC</button>
      </form>
    </div>

    <div id="tab-register" class="hidden">
      <form method="POST" action="/register" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="reg-user">Usuário *</label>
            <input id="reg-user" name="username" type="text" class="input-field" placeholder="joao.silva" required />
          </div>
          <div>
            <label for="reg-name">Nome completo</label>
            <input id="reg-name" name="display_name" type="text" class="input-field" placeholder="João Silva" />
          </div>
        </div>
        <div>
          <label for="reg-email">E-mail</label>
          <input id="reg-email" name="email" type="email" class="input-field" placeholder="joao@empresa.com" />
        </div>
        <div>
          <label for="reg-pass">Senha *</label>
          <input id="reg-pass" name="password" type="password" class="input-field" placeholder="Mínimo 6 caracteres" required />
        </div>
        <div>
          <label for="reg-reason">Justificativa de acesso *</label>
          <textarea id="reg-reason" name="reason" rows="3" class="input-field" placeholder="Descreva brevemente por que você precisa de acesso ao painel SOC..." required style="resize:none"></textarea>
        </div>
        <button type="submit" class="btn-primary">📨 Enviar Solicitação</button>
      </form>
      <p class="text-center text-xs text-slate-600 mt-4">Sua solicitação será analisada pelo administrador.</p>
    </div>

    <div class="mt-6 pt-5 border-t border-white/5 text-center">
      <p class="text-xs text-slate-700">Aegis SIEM & EDR Platform v1.0 · Acesso restrito a usuários autorizados</p>
    </div>
  </div>

  <script>
    const showTab = (tab) => {
      document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('tab-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login-btn').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register-btn').classList.toggle('active', tab === 'register');
    };
    {% if show_register %}showTab('register');{% endif %}
  </script>
</body>
</html>
