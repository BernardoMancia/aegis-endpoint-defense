<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis SOC — Autenticação</title>
  <meta name="description" content="Portal de acesso ao painel SOC da plataforma Aegis SIEM & EDR" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080c14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      pointer-events: none;
    }
    .glow-orb-2 {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -80px;
      right: -80px;
      pointer-events: none;
    }
    .card {
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(14,165,233,0.15);
      border-radius: 20px;
      box-shadow: 0 0 80px rgba(14,165,233,0.06), 0 32px 64px rgba(0,0,0,0.4);
    }
    .input-field {
      background: rgba(22,27,36,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e2e8f0;
      padding: 12px 16px;
      font-size: 14px;
      transition: all 0.2s;
      width: 100%;
      outline: none;
    }
    .input-field:focus {
      border-color: rgba(14,165,233,0.5);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.08);
    }
    .input-field::placeholder { color: #475569; }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(14,165,233,0.35);
    }
    .btn-secondary {
      background: transparent;
      color: #64748b;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 10px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      border-color: rgba(14,165,233,0.3);
      color: #94a3b8;
      background: rgba(14,165,233,0.04);
    }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
    }
    .alert-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
    }
    .tab-btn {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab-btn.active {
      background: rgba(14,165,233,0.15);
      color: #0ea5e9;
      border: 1px solid rgba(14,165,233,0.3);
    }
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
      animation: scan 4s linear infinite;
      opacity: 0.4;
    }
    @keyframes scan {
      0% { transform: translateY(-2px); }
      100% { transform: translateY(100vh); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    label { font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 6px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb-2"></div>
  <div class="scan-line"></div>

  <div class="card w-full max-w-md mx-4 p-8 fade-up">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-500 to-blue-700 flex items-center justify-center flex-shrink-0">
        <svg style="width:20px;height:20px;" fill="none" stroke="white" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-bold text-white text-lg leading-none">AEGIS <span class="text-sky-400">SOC</span></h1>
        <p class="text-xs text-slate-500 mt-0.5">Security Operations Center</p>
      </div>
    </div>

    <div class="flex gap-2 mb-6 p-1 bg-slate-900/50 rounded-xl">
      <button id="tab-login-btn" class="tab-btn active flex-1" onclick="showTab('login')">Entrar</button>
      <button id="tab-register-btn" class="tab-btn flex-1" onclick="showTab('register')">Solicitar Acesso</button>
    </div>

    {% if error %}
    <div class="alert-error mb-5">⚠️ {{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert-success mb-5">✅ {{ success }}</div>
    {% endif %}

    <div id="tab-login">
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="login-user">Usuário</label>
          <input id="login-user" name="username" type="text" class="input-field" placeholder="seu.usuario" autocomplete="username" required />
        </div>
        <div>
          <label for="login-pass">Senha</label>
          <input id="login-pass" name="password" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary mt-2">🔐 Entrar no SOC</button>
      </form>
    </div>

    <div id="tab-register" class="hidden">
      <form method="POST" action="/register" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="reg-user">Usuário *</label>
            <input id="reg-user" name="username" type="text" class="input-field" placeholder="joao.silva" required />
          </div>
          <div>
            <label for="reg-name">Nome completo</label>
            <input id="reg-name" name="display_name" type="text" class="input-field" placeholder="João Silva" />
          </div>
        </div>
        <div>
          <label for="reg-email">E-mail</label>
          <input id="reg-email" name="email" type="email" class="input-field" placeholder="joao@empresa.com" />
        </div>
        <div>
          <label for="reg-pass">Senha *</label>
          <input id="reg-pass" name="password" type="password" class="input-field" placeholder="Mínimo 6 caracteres" required />
        </div>
        <div>
          <label for="reg-reason">Justificativa de acesso *</label>
          <textarea id="reg-reason" name="reason" rows="3" class="input-field" placeholder="Descreva brevemente por que você precisa de acesso ao painel SOC..." required style="resize:none"></textarea>
        </div>
        <button type="submit" class="btn-primary">📨 Enviar Solicitação</button>
      </form>
      <p class="text-center text-xs text-slate-600 mt-4">Sua solicitação será analisada pelo administrador.</p>
    </div>

    <div class="mt-6 pt-5 border-t border-white/5 text-center">
      <p class="text-xs text-slate-700">Aegis SIEM & EDR Platform v1.0 · Acesso restrito a usuários autorizados</p>
    </div>
  </div>

  <script>
    const showTab = (tab) => {
      document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('tab-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login-btn').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register-btn').classList.toggle('active', tab === 'register');
    };
    {% if show_register %}showTab('register');{% endif %}
  </script>
</body>
</html>
